<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REBEL-OS 8.1 | GARRAS CORE - PROPIEDAD DE SAÚL</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #050505;
            --accent-white: #ffffff;
            --legacy-gray: #2a2a2a;
            --danger: #ff3333;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-dark); color: var(--accent-white);
            font-family: 'Montserrat', sans-serif; overflow: hidden;
        }

        /* --- PANTALLA DE BOOTEO (EXTENDIDA) --- */
        #boot-screen {
            position: fixed; inset: 0; z-index: 99999;
            background: #000; display: flex; align-items: center; justify-content: center;
            font-family: 'Share Tech Mono', monospace;
        }
        .boot-log { width: 80%; max-width: 500px; color: #0f0; font-size: 12px; }

        /* --- SISTEMA DE AUTENTICACIÓN DUAL --- */
        #auth-overlay {
            position: fixed; inset: 0; z-index: 88888;
            background: rgba(0,0,0,0.95); display: none;
            align-items: center; justify-content: center;
        }
        .auth-container {
            width: 320px; padding: 40px; border: 1px solid #222;
            background: #0a0a0a; text-align: center;
        }
        .garra-logo { font-size: 40px; font-weight: 900; margin-bottom: 10px; letter-spacing: -2px; }
        .auth-btn {
            width: 100%; padding: 15px; margin: 10px 0; border: none;
            font-weight: 900; text-transform: uppercase; cursor: pointer;
            transform: skewX(-15deg); transition: 0.3s;
        }
        .btn-legacy { background: transparent; border: 2px solid var(--accent-white); color: #fff; }
        .btn-new { background: var(--accent-white); color: #000; }
        .auth-btn:hover { transform: skewX(-15deg) scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* --- ESCRITORIO --- */
        #desktop {
            height: calc(100% - 50px); padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            grid-template-rows: repeat(auto-fill, 110px); gap: 20px;
            background-size: cover; background-position: center;
        }
        .icon {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .icon:active { transform: scale(0.9); }
        .icon img { width: 55px; height: 55px; margin-bottom: 8px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .icon span { 
            font-size: 11px; font-weight: bold; text-align: center;
            background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px;
        }

        /* --- VENTANAS (SISTEMA GARRAS) --- */
        .window {
            position: absolute; min-width: 350px; background: #000;
            border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: none; flex-direction: column; z-index: 100;
        }
        .title-bar {
            background: var(--accent-white); color: #000; padding: 8px 15px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: move; font-weight: 900; font-size: 12px;
        }
        .close-btn { background: var(--danger); border: none; width: 20px; height: 20px; cursor: pointer; }
        .win-content { flex: 1; padding: 15px; overflow: auto; min-height: 250px; }

        /* --- TASKBAR --- */
        .taskbar {
            position: fixed; bottom: 0; width: 100%; height: 50px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 15px; border-top: 1px solid #222; z-index: 9999;
        }
        .start-btn {
            width: 40px; height: 40px; background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; transform: skewX(-15deg); cursor: pointer;
        }
        .user-info { margin-left: 20px; font-size: 13px; font-weight: bold; border-left: 1px solid #333; padding-left: 20px; }
        #clock { margin-left: auto; font-family: 'Share Tech Mono'; font-weight: bold; }

        @media (max-width: 600px) {
            .window { width: 95% !important; left: 2.5% !important; top: 10% !important; }
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="boot-log" id="boot-log"></div>
    </div>

    <div id="auth-overlay">
        <div class="auth-container">
            <div class="garra-logo">GARRAS</div>
            <p style="font-size: 11px; letter-spacing: 2px; color: #666; margin-bottom: 30px;">REBEL-OS ARQUITECTURA v8.1</p>
            <button class="auth-btn btn-legacy" onclick="access('GARRAS_BLANCAS')">ACCESO LEGADO V3</button>
            <button class="auth-btn btn-new" onclick="access('NUEVO_USUARIO')">NUEVA IDENTIDAD</button>
        </div>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openWin('win-store')">
            <img src="https://cdn-icons-png.flaticon.com/512/3382/3382703.png">
            <span>Tienda</span>
        </div>
        <div class="icon" onclick="openWin('win-config')">
            <img src="https://cdn-icons-png.flaticon.com/512/3938/3938457.png">
            <span>Sistema</span>
        </div>
        <div id="apps-container" style="display: contents;"></div>
    </div>

    <div class="window" id="win-store" style="width: 450px; top: 100px; left: 100px;">
        <div class="title-bar" onmousedown="initDrag(event, 'win-store')"><span>REBEL STORE</span><button class="close-btn" onclick="closeWin('win-store')"></button></div>
        <div class="win-content">
            <h3 style="margin-top:0;">Aplicaciones para Saúl</h3>
            <div style="background: #111; padding: 15px; border-radius: 5px; margin-bottom: 10px;">
                <strong>Módulo Steam</strong><br><small>Acceso a biblioteca de juegos.</small><br>
                <button onclick="installModule('Steam', 'https://cdn-icons-png.flaticon.com/512/5968/5968814.png', 'https://store.steampowered.com')" style="margin-top:10px;">Instalar</button>
            </div>
            <div style="background: #111; padding: 15px; border-radius: 5px;">
                <strong>Módulo Discord</strong><br><small>Comunicación táctica.</small><br>
                <button onclick="installModule('Discord', 'https://cdn-icons-png.flaticon.com/512/5968/5968756.png', 'https://discord.com')" style="margin-top:10px;">Instalar</button>
            </div>
        </div>
    </div>

    <div class="window" id="win-config" style="width: 350px; top: 150px; left: 150px;">
        <div class="title-bar" onmousedown="initDrag(event, 'win-config')"><span>SISTEMA</span><button class="close-btn" onclick="closeWin('win-config')"></button></div>
        <div class="win-content">
            <p><strong>Usuario:</strong> <span id="display-name">Saúl</span></p>
            <p><strong>Kernel:</strong> 8.1.0-GarrasCore</p>
            <hr style="border:0; border-top:1px solid #333;">
            <button onclick="resetOS()" style="width:100%; padding:10px; background:var(--danger); color:white; border:none; font-weight:bold;">FORMATEAR SISTEMA</button>
        </div>
    </div>

    <div id="dynamic-windows"></div>

    <div class="taskbar">
        <div class="start-btn" onclick="alert('GARRAS CORE v8.1 - Saúl Edition')">G</div>
        <div class="user-info" id="user-tag">Saúl</div>
        <div id="clock">00:00:00</div>
    </div>

    <script>
        // --- SECUENCIA DE BOOTEO LARGA ---
        const logLines = [
            "> Iniciando GARRAS_CORE_V8.1...",
            "> Verificando integridad de Saúl...",
            "> Cargando Retro-compatibilidad V2/V3...",
            "> Buscando firma 'Garras Blancas'...",
            "> Kernel listo. Esperando autenticación."
        ];

        function boot() {
            const logBox = document.getElementById('boot-log');
            let i = 0;
            const interval = setInterval(() => {
                if(i < logLines.length) {
                    logBox.innerHTML += `<p>${logLines[i]}</p>`;
                    i++;
                } else {
                    clearInterval(interval);
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('auth-overlay').style.display = 'flex';
                }
            }, 600);
        }

        // --- MANEJO DE ACCESO ---
        function access(mode) {
            let identity = "Saúl";
            if(mode === 'GARRAS_BLANCAS') {
                identity = "Saúl (Garras Blancas V3)";
            }
            localStorage.setItem('os_user', identity);
            document.getElementById('user-tag').innerText = identity;
            document.getElementById('display-name').innerText = identity;
            
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('desktop').style.display = 'grid';
            refreshApps();
        }

        // --- SISTEMA DE INSTALACIÓN ---
        function installModule(name, img, url) {
            let registry = JSON.parse(localStorage.getItem('os_registry') || '[]');
            if(!registry.find(a => a.name === name)) {
                registry.push({name, img, url});
                localStorage.setItem('os_registry', JSON.stringify(registry));
                refreshApps();
                alert(`Módulo ${name} inyectado con éxito.`);
            }
        }

        function refreshApps() {
            const registry = JSON.parse(localStorage.getItem('os_registry') || '[]');
            const iconArea = document.getElementById('apps-container');
            const winArea = document.getElementById('dynamic-windows');
            iconArea.innerHTML = "";
            winArea.innerHTML = "";

            registry.forEach(app => {
                const id = `win-${app.name.toLowerCase()}`;
                iconArea.innerHTML += `<div class="icon" onclick="openWin('${id}')"><img src="${app.img}"><span>${app.name}</span></div>`;
                winArea.innerHTML += `
                    <div class="window" id="${id}" style="width: 600px; height: 400px; top: 100px; left: 100px;">
                        <div class="title-bar" onmousedown="initDrag(event, '${id}')"><span>${app.name}</span><button class="close-btn" onclick="closeWin('${id}')"></button></div>
                        <div class="win-content" style="padding:0;"><iframe src="${app.url}" style="width:100%; height:100%; border:none; background:#fff;"></iframe></div>
                    </div>`;
            });
        }

        // --- CONTROL DE VENTANAS ---
        function openWin(id) {
            const w = document.getElementById(id);
            if(w) {
                w.style.display = 'flex';
                w.style.zIndex = Math.floor(Date.now() / 1000000);
            }
        }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; }
        
        function resetOS() { if(confirm("¿Confirmas borrado total de Garras Core?")) { localStorage.clear(); location.reload(); } }

        // --- RELOJ ---
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        // --- DRAG LOGIC (COMPLETA) ---
        let dragTarget = null, dragX = 0, dragY = 0;
        function initDrag(e, id) {
            dragTarget = document.getElementById(id);
            dragX = e.clientX - dragTarget.offsetLeft;
            dragY = e.clientY - dragTarget.offsetTop;
            document.onmousemove = (ev) => {
                if(dragTarget) {
                    dragTarget.style.left = (ev.clientX - dragX) + 'px';
                    dragTarget.style.top = (ev.clientY - dragY) + 'px';
                }
            };
            document.onmouseup = () => { dragTarget = null; };
        }

        window.onload = boot;
    </script>
</body>
</html>
