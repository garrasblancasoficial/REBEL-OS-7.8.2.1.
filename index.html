<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARRAS CORE 2026 | V9.2 FULL ARSENAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #fff; --ok: #0f0; --dim: #555; }
        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--accent); font-family: 'Share Tech Mono', monospace; overflow: hidden; }

        /* --- CARGA ESTILO V6 --- */
        #boot-screen { position: fixed; inset: 0; z-index: 100000; background: #000; display: flex; align-items: center; justify-content: center; }
        .boot-log { width: 80%; max-width: 450px; }
        .line { margin: 4px 0; font-size: 14px; color: var(--ok); opacity: 0; }
        @keyframes blink { 50% { opacity: 0; } }
        .cursor::after { content: '_'; animation: blink 1s infinite; }

        /* --- LOGIN ANÓNIMO --- */
        #login-screen { position: fixed; inset: 0; z-index: 90000; background: #000; display: none; align-items: center; justify-content: center; }
        .login-box { border: 1px solid #333; padding: 40px; text-align: center; background: #050505; width: 320px; }
        .g-input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; width: 100%; margin: 10px 0; text-align: center; font-family: inherit; }
        .g-btn { width: 100%; padding: 15px; background: #fff; color: #000; font-weight: 900; border: none; cursor: pointer; transform: skewX(-15deg); }

        /* --- ESCRITORIO --- */
        #desktop { display: none; height: calc(100% - 50px); padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); grid-template-rows: repeat(auto-fill, 110px); gap: 20px; background-size: cover; }
        .icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .icon:hover { transform: scale(1.1); }
        .icon img { width: 50px; height: 50px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
        .icon span { font-size: 10px; margin-top: 8px; background: rgba(0,0,0,0.8); padding: 2px 6px; border: 1px solid #222; }

        /* --- VENTANAS --- */
        .window { position: absolute; background: #000; border: 1px solid #333; display: none; flex-direction: column; z-index: 10; min-width: 320px; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        .title-bar { background: #fff; color: #000; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; cursor: move; font-size: 11px; font-weight: 900; }
        .win-body { flex: 1; padding: 0; background: #000; min-height: 300px; overflow: hidden; }
        .close-x { background: #ff4444; border: none; color: #fff; width: 18px; height: 18px; cursor: pointer; font-size: 10px; }

        /* --- TASKBAR --- */
        .taskbar { position: fixed; bottom: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.95); border-top: 1px solid #222; display: flex; align-items: center; padding: 0 15px; z-index: 10000; }
        .start-orb { width: 38px; height: 38px; background: #fff; color: #000; font-weight: 900; transform: skewX(-15deg); border: none; cursor: pointer; font-size: 18px; }
        #clock { margin-left: auto; color: #fff; font-size: 12px; }

        /* --- APPS ESPECÍFICAS --- */
        .ia-log { height: 200px; overflow-y: auto; padding: 10px; font-size: 12px; color: var(--ok); border-bottom: 1px solid #222; }
        .notes-txt { width: 100%; height: 300px; background: #000; color: #fff; border: none; padding: 15px; resize: none; font-family: inherit; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="boot-log" id="b-log"></div>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="letter-spacing: 4px; font-size: 20px;">GARRAS CORE</h1>
            <p style="font-size: 9px; color: var(--dim); margin-bottom: 20px;">VERSIÓN 9.2 FULL ARSENAL</p>
            <input type="text" id="id-in" class="g-input" placeholder="ID_ACCESO">
            <button class="g-btn" onclick="login()">DESCIFRAR</button>
        </div>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openW('win-ia')"><img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png"><span>GARRAS_IA</span></div>
        <div class="icon" onclick="openW('win-notes')"><img src="https://cdn-icons-png.flaticon.com/512/2965/2965333.png"><span>NOTAS</span></div>
        <div class="icon" onclick="openW('win-browser')"><img src="https://cdn-icons-png.flaticon.com/512/841/841364.png"><span>EXPLORER</span></div>
        <div class="icon" onclick="openW('win-store')"><img src="https://cdn-icons-png.flaticon.com/512/3382/3382703.png"><span>STORE</span></div>
        <div class="icon" onclick="openW('win-arch')"><img src="https://cdn-icons-png.flaticon.com/512/3938/3938457.png"><span>CONFIG</span></div>
        <div id="apps-container" style="display:contents;"></div>
    </div>

    <div class="window" id="win-ia" style="width: 420px; top: 50px; left: 50px;">
        <div class="title-bar" onmousedown="drag(event, 'win-ia')"><span>GARRAS_IA</span><button class="close-x" onclick="closeW('win-ia')">X</button></div>
        <div class="win-body">
            <div class="ia-log" id="ia-box">> SISTEMA GARRAS_CORE ONLINE...<br>> ESPERANDO COMANDOS.</div>
            <input type="text" id="ia-in" class="g-input" style="text-align:left; border:none;" placeholder="CMD_">
        </div>
    </div>

    <div class="window" id="win-notes" style="width: 350px; top: 100px; left: 100px;">
        <div class="title-bar" onmousedown="drag(event, 'win-notes')"><span>BUNKER_NOTES</span><button class="close-x" onclick="closeW('win-notes')">X</button></div>
        <div class="win-body"><textarea id="n-txt" class="notes-txt" oninput="saveN()"></textarea></div>
    </div>

    <div class="window" id="win-browser" style="width: 600px; top: 40px; left: 120px;">
        <div class="title-bar" onmousedown="drag(event, 'win-browser')"><span>EXPLORER</span><button class="close-x" onclick="closeW('win-browser')">X</button></div>
        <div class="win-body"><iframe id="b-frame" src="https://www.bing.com" style="width:100%; height:400px; border:none; background:#fff;"></iframe></div>
    </div>

    <div class="window" id="win-store" style="width: 400px; top: 150px; left: 150px;">
        <div class="title-bar" onmousedown="drag(event, 'win-store')"><span>REBEL_STORE</span><button class="close-x" onclick="closeW('win-store')">X</button></div>
        <div class="win-body" style="padding:15px;">
            <p style="font-size:11px; color:var(--dim);">Instalación directa al escritorio:</p>
            <button class="g-btn" style="background:#1DB954; color:#000; margin-bottom:10px;" onclick="install('Spotify', 'https://cdn-icons-png.flaticon.com/512/174/174872.png', 'https://open.spotify.com/embed')">CARGAR SPOTIFY</button>
            <button class="g-btn" style="background:#5865F2; color:#fff;" onclick="install('Discord', 'https://cdn-icons-png.flaticon.com/512/2111/2111370.png', 'https://discord.com')">CARGAR DISCORD</button>
        </div>
    </div>

    <div class="window" id="win-arch" style="width: 300px; top: 200px; left: 200px;">
        <div class="title-bar" onmousedown="drag(event, 'win-arch')"><span>ARQUITECTO</span><button class="close-x" onclick="closeW('win-arch')">X</button></div>
        <div class="win-body" style="padding:15px; text-align:center;">
            <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:1px solid red; padding:10px; cursor:pointer;">RESETEAR KERNEL</button>
        </div>
    </div>

    <div id="dyn-wins"></div>

    <div class="taskbar">
        <button class="start-orb">G</button>
        <div style="margin-left:15px; font-size:10px; color:var(--dim);" id="kernel-tag">GARRAS_CORE_V9.2</div>
        <div id="clock">00:00:00</div>
    </div>

    <script>
        // --- SECUENCIA V6 ---
        const lines = ["INICIANDO...", "REVISANDO KERNEL... OK", "REVISANDO GARRAS... OK", "CARGANDO ARSENAL... OK", "SISTEMA LISTO."];
        window.onload = () => {
            const log = document.getElementById('b-log');
            lines.forEach((t, i) => {
                setTimeout(() => {
                    const l = document.createElement('div');
                    l.className = 'line cursor';
                    l.innerText = `> ${t}`;
                    l.style.opacity = 1;
                    log.appendChild(l);
                    if(i === lines.length -1) setTimeout(() => {
                        document.getElementById('boot-screen').style.display = 'none';
                        document.getElementById('login-screen').style.display = 'flex';
                    }, 800);
                }, i * 500);
            });
            loadD();
        }

        function login() {
            const id = document.getElementById('id-in').value.toLowerCase();
            if(id.includes('garras')) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('desktop').style.display = 'grid';
                document.getElementById('kernel-tag').innerText = "GARRAS_2026_SA";
            } else { alert("ACCESO DENEGADO"); }
        }

        function install(name, img, url) {
            let apps = JSON.parse(localStorage.getItem('g_apps') || '[]');
            if(!apps.find(a => a.name === name)) {
                apps.push({name, img, url});
                localStorage.setItem('g_apps', JSON.stringify(apps));
                renderA();
            }
        }

        function renderA() {
            const apps = JSON.parse(localStorage.getItem('g_apps') || '[]');
            const iconArea = document.getElementById('apps-container');
            const winArea = document.getElementById('dyn-wins');
            iconArea.innerHTML = ""; winArea.innerHTML = "";
            apps.forEach(app => {
                const id = `win-${app.name.toLowerCase()}`;
                iconArea.innerHTML += `<div class="icon" onclick="openW('${id}')"><img src="${app.img}"><span>${app.name}</span></div>`;
                winArea.innerHTML += `
                    <div class="window" id="${id}" style="width: 500px; height: 350px; top: 100px; left: 100px;">
                        <div class="title-bar" onmousedown="drag(event, '${id}')"><span>${app.name}</span><button class="close-x" onclick="closeW('${id}')">X</button></div>
                        <div class="win-body"><iframe src="${app.url}" style="width:100%; height:100%; border:none; background:#fff;"></iframe></div>
                    </div>`;
            });
        }

        function openW(id) { document.getElementById(id).style.display = 'flex'; document.getElementById(id).style.zIndex = Math.floor(Date.now()/1000); }
        function closeW(id) { document.getElementById(id).style.display = 'none'; }
        function saveN() { localStorage.setItem('g_notes', document.getElementById('n-txt').value); }
        function loadD() { document.getElementById('n-txt').value = localStorage.getItem('g_notes') || ""; renderA(); }

        let active = null, ox=0, oy=0;
        function drag(e, id) {
            active = document.getElementById(id);
            ox = e.clientX - active.offsetLeft; oy = e.clientY - active.offsetTop;
            document.onmousemove = (ev) => { if(active) { active.style.left = (ev.clientX - ox) + 'px'; active.style.top = (ev.clientY - oy) + 'px'; } };
            document.onmouseup = () => { active = null; };
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
